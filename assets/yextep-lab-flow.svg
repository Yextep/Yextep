<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Animated Yextep lab protocol pipeline</title>
  <desc id="desc">A cyber lab workflow moving from scope to recon, isolated testing, reporting, hardening and publishing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#07152F"/>
      <stop offset="100%" stop-color="#03130F"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="48%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 15px 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; fill:#FFFFFF; }
      .text { font: 600 11px 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; fill:#9DEFFF; }
      .dash { stroke-dasharray: 12 14; animation: dash 10s linear infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin:center; }
      @keyframes dash { to { stroke-dashoffset:-260; } }
      @keyframes pulse { 0%,100% { opacity:.55; transform:scale(.98); } 50% { opacity:1; transform:scale(1.04); } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>

  <rect width="1200" height="260" rx="24" fill="url(#bg)"/>
  <path d="M0 214 C180 174 245 230 390 190 S640 126 792 170 S1030 238 1200 168 V260 H0Z" fill="#00E5FF" opacity=".06"/>
  <path id="route" class="dash" d="M92 132 C210 42 314 42 430 132 S642 222 760 132 S970 42 1110 132" fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M92 132 C210 42 314 42 430 132 S642 222 760 132 S970 42 1110 132" fill="none" stroke="#FFFFFF" stroke-opacity=".08" stroke-width="16" stroke-linecap="round"/>

  <circle r="9" fill="#00FF88" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
      <mpath href="#route"/>
    </animateMotion>
  </circle>
  <circle r="6" fill="#00E5FF" filter="url(#glow)">
    <animateMotion dur="6s" begin="2s" repeatCount="indefinite" rotate="auto">
      <mpath href="#route"/>
    </animateMotion>
  </circle>
  <circle r="6" fill="#FFB000" filter="url(#glow)">
    <animateMotion dur="6s" begin="4s" repeatCount="indefinite" rotate="auto">
      <mpath href="#route"/>
    </animateMotion>
  </circle>

  <g transform="translate(92 132)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -8;0 0" dur="5s" repeatCount="indefinite"/>
    <circle r="30" fill="#020617" stroke="#00E5FF" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#00E5FF" stroke-opacity=".18" class="pulse"/>
    <text x="0" y="-50" text-anchor="middle" class="title">SCOPE</text>
    <text x="0" y="57" text-anchor="middle" class="text">legal target</text>
  </g>
  <g transform="translate(255 66)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -8;0 0" dur="5.4s" repeatCount="indefinite"/>
    <circle r="30" fill="#020617" stroke="#00FF88" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#00FF88" stroke-opacity=".18" class="pulse"/>
    <text x="0" y="-50" text-anchor="middle" class="title">RECON</text>
    <text x="0" y="57" text-anchor="middle" class="text">collect signal</text>
  </g>
  <g transform="translate(430 132)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -8;0 0" dur="5.8s" repeatCount="indefinite"/>
    <circle r="30" fill="#020617" stroke="#7C3AED" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#7C3AED" stroke-opacity=".2" class="pulse"/>
    <text x="0" y="-50" text-anchor="middle" class="title">LAB</text>
    <text x="0" y="57" text-anchor="middle" class="text">isolate test</text>
  </g>
  <g transform="translate(600 196)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -8;0 0" dur="6.2s" repeatCount="indefinite"/>
    <circle r="30" fill="#020617" stroke="#FFB000" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#FFB000" stroke-opacity=".18" class="pulse"/>
    <text x="0" y="-50" text-anchor="middle" class="title">PROOF</text>
    <text x="0" y="57" text-anchor="middle" class="text">capture evidence</text>
  </g>
  <g transform="translate(760 132)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -8;0 0" dur="5.6s" repeatCount="indefinite"/>
    <circle r="30" fill="#020617" stroke="#00E5FF" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#00E5FF" stroke-opacity=".18" class="pulse"/>
    <text x="0" y="-50" text-anchor="middle" class="title">REPORT</text>
    <text x="0" y="57" text-anchor="middle" class="text">explain impact</text>
  </g>
  <g transform="translate(940 66)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -8;0 0" dur="6s" repeatCount="indefinite"/>
    <circle r="30" fill="#020617" stroke="#00FF88" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#00FF88" stroke-opacity=".18" class="pulse"/>
    <text x="0" y="-50" text-anchor="middle" class="title">HARDEN</text>
    <text x="0" y="57" text-anchor="middle" class="text">turn into fix</text>
  </g>
  <g transform="translate(1110 132)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0;0 -8;0 0" dur="5.2s" repeatCount="indefinite"/>
    <circle r="30" fill="#020617" stroke="#FF3D81" stroke-width="2"/>
    <circle r="40" fill="none" stroke="#FF3D81" stroke-opacity=".18" class="pulse"/>
    <text x="0" y="-50" text-anchor="middle" class="title">PUBLISH</text>
    <text x="0" y="57" text-anchor="middle" class="text">share method</text>
  </g>

  <text x="600" y="32" text-anchor="middle" class="title" fill="#00E5FF">YEXTEP LAB PROTOCOL // PIPELINE DE PRUEBAS CONTROLADAS</text>
</svg>
